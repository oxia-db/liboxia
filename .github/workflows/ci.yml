name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy -p oxia-client --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      # The dockerized integration tests each start a container and, on a cold
      # runner, would otherwise all pull this image at once — concurrent pulls of
      # the same image race in the Docker client ("bytes remaining on stream").
      # Pull it once up front so the tests find it already present.
      - name: Pre-pull Oxia test image
        run: docker pull oxia/oxia:main

      - name: Run tests
        run: cargo test --workspace

      # The default `cargo test` runs with the optional features off, so their
      # paths are never exercised above. Run the feature-gated tests explicitly
      # (the image is already pulled).
      - name: Run metrics test (otel feature)
        run: cargo test -p oxia-client --features otel --test integration_tests test_metrics_recorded_through_meter_provider

      - name: Run TLS tests (tls feature)
        run: cargo test -p oxia-client --features tls --test tls_tests

  semver:
    name: Semver checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # cargo-semver-checks compares the local API against the latest release
      # on crates.io. Skip (with a notice) until the crate has been published;
      # the 0.1.0 release establishes the baseline and arms this job.
      - name: Check for a published baseline
        id: baseline
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -A "oxia-client-rust-ci (github.com/oxia-db/oxia-client-rust)" \
            https://crates.io/api/v1/crates/oxia-client)
          if [ "$code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::oxia-client is not on crates.io yet (HTTP $code); skipping semver check until the first release."
          fi

      # The semver baseline is the last *published* release, which may predate
      # the protox migration and still build-depend on protoc. Install it only
      # here so cargo-semver-checks can build that baseline; the current tree
      # needs no protoc (it compiles the proto with protox).
      - name: Install protobuf compiler (for the published baseline)
        if: steps.baseline.outputs.exists == 'true'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: cargo semver-checks
        if: steps.baseline.outputs.exists == 'true'
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: oxia-client
